<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DS Scanner PDF Pro 100% local</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" id="opencv-src"></script>
    <style>
        :root {
            --primary: #25D366;
            --dark: #121b22;
            --light: #f0f2f5;
            --accent: #007bff;
            --danger: #ef4444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0; padding: 0; background-color: var(--light); color: var(--dark);
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        header {
            background-color: var(--dark); color: white; width: 100%; text-align: center;
            padding: 10px 0; font-weight: bold; font-size: 16px; flex-shrink: 0;
        }
        .main-layout { display: flex; width: 100%; height: calc(100vh - 41px); box-sizing: border-box; }
        
        .sidebar {
            width: 40%; max-width: 450px; min-width: 320px; background: white;
            border-right: 1px solid #cbd5e1; display: flex; flex-direction: column; box-sizing: border-box;
        }
        .sidebar-scroll-content { flex-grow: 1; overflow-y: auto; padding: 15px; }

        .preview-panel {
            width: 60%; flex-grow: 1; background: #525659; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 35px; box-sizing: border-box; position: relative;
            touch-action: none; user-select: none;
        }
        .pdf-canvas-mock {
            background: white; box-shadow: 0 4px 20px rgba(0,0,0,0.4); display: flex; align-items: center;
            justify-content: center; overflow: hidden; position: relative; max-width: 100%; max-height: 100%;
        }
        .pdf-canvas-mock img { position: absolute; object-fit: contain !important; }
        
        .ruler-svg-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1100;
        }

        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .btn-group .btn-label, .btn-group button { flex: 1 1 140px; min-height: 42px; }
        button, label.btn-label {
            background-color: var(--primary); color: white; border: none; padding: 10px;
            border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; 
            text-align: center; box-sizing: border-box; display: flex; align-items: center; justify-content: center;
        }
        .btn-label input[type="file"] { display: none !important; }
        .btn-block { width: 100%; background-color: var(--accent); margin-top: 5px; }
        
        .config-section { background: #f8f9fa; padding: 10px; border-radius: 6px; margin-bottom: 12px; border: 1px solid #e2e8f0; }
        .config-section label { font-size: 11px; color: #4a5568; font-weight: bold; }
        select, input[type="range"] { width: 100%; padding: 6px; margin-top: 2px; margin-bottom: 6px; border-radius: 4px; border: 1px solid #cbd5e1; font-size: 12px; box-sizing: border-box; }
        
        .editor-local-box { position: relative; width: 100%; background: #000; overflow: hidden; margin-bottom: 10px; display: none; }
        .editor-local-box img { width: 100%; display: block; user-select: none; }
        
        .corner-handle {
            position: absolute; width: 28px; height: 24px; background: var(--primary);
            border: 3px solid white; border-radius: 50%; cursor: move; z-index: 100;
            transform: translate(-14px, -12px); box-shadow: 0 3px 8px rgba(0,0,0,0.4);
        }
        .svg-overlay { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 50; }

        .workspace-title { font-size: 13px; font-weight: bold; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        .workspace { display: flex; gap: 10px; padding: 10px 0; overflow-x: auto; min-height: 125px; }
        .workspace.vertical { flex-direction: column; overflow-x: hidden; overflow-y: auto; max-height: 300px; }
        
        .slot-container { display: flex; gap: 8px; width: 100%; margin: 8px 0; }
        .slot-box {
            flex: 1; background: #f1f5f9; border: 2px dashed #cbd5e1; border-radius: 6px; padding: 8px;
            text-align: center; font-size: 11px; font-weight: bold; color: #64748b; cursor: pointer;
        }
        .slot-box.active { border-color: var(--accent); background: #e0f2fe; color: var(--accent); }
        .slot-box img { max-width: 100%; max-height: 50px; display: block; margin: 4px auto 0; object-fit: contain; }

        .page-card {
            background: #f1f5f9; border: 2px solid #cbd5e1; border-radius: 6px; padding: 6px;
            display: flex; flex-direction: column; align-items: center; min-width: 110px; max-width: 110px; position: relative; cursor: grab; box-sizing: border-box;
        }
        .page-card:active { cursor: grabbing; }
        .page-card.active { border-color: var(--accent); background: #e0f2fe; }
        .page-card img { max-width: 80px; max-height: 50px; object-fit: contain; pointer-events: none; margin-top: 4px; }
        .card-actions { display: flex; gap: 4px; margin-top: 5px; width: 100%; }
        .card-actions button { padding: 4px; font-size: 9px; flex-grow: 1; background: #64748b; color: white; border: none; border-radius: 4px; cursor: pointer; }
        
        .camera-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2500; align-items: center; justify-content: center; flex-direction: column;
        }
        .camera-modal video { width: 85%; max-width: 640px; border: 3px solid var(--primary); border-radius: 12px; background: black; }
        .camera-controls { margin-top: 15px; display: flex; gap: 10px; }
        .camera-controls button { min-width: 120px; }

        #cvLoading { display: none; background: #eab308; color: black; font-size: 11px; padding: 6px; text-align: center; font-weight: bold; margin-bottom: 8px; border-radius: 4px; }
        
        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; }
            header { font-size: 14px; padding: 8px 0; }
            .main-layout { flex-direction: column; height: auto; }
            .sidebar { width: 100%; max-width: 100%; min-width: 100%; border-right: none; border-bottom: 1px solid #cbd5e1; height: auto; }
            .sidebar-scroll-content { overflow-y: visible; padding: 12px; }
            .preview-panel { width: 100%; height: 60vh; min-height: 400px; padding: 15px; }
        }
    </style>
</head>
<body>

    <header id="appHeader">DS Scanner PDF Pro 100% local</header>

    <div class="main-layout" id="mainLayout">
        <div class="sidebar">
            <div class="sidebar-scroll-content">
                <div class="btn-group">
                    <button type="button" id="btnCapturarGatillo" onclick="dispararCamaraDispositivo()">📷 Capturar Foto</button>
                    <input type="file" accept="image/*" capture="environment" id="cameraInput" style="display:none !important;">
                    <label class="btn-label" style="background-color: #2b7a78; font-size:13px;">🖼️ Galería / Archivos <input type="file" accept="image/*" id="galleryInput"></label>
                </div>

                <div id="cvLoading">⏳ Cargando Motores de Visión Artificial...</div>

                <div class="editor-local-box" id="editorLocalBox">
                    <svg class="svg-overlay" id="svgLines"><polygon id="svgPoly" points="" style="fill:rgba(37,211,102,0.15); stroke:#25D366; stroke-width:2; stroke-dasharray:4;" /></svg>
                    <img id="editorImg" src="">
                    <canvas id="canvasAux" style="display:none;"></canvas>
                    
                    <div class="corner-handle" id="pt_tl"></div>
                    <div class="corner-handle" id="pt_tr"></div>
                    <div class="corner-handle" id="pt_br"></div>
                    <div class="corner-handle" id="pt_bl"></div>
                </div>

                <div class="config-section" id="wrapperGiroManual" style="display:none;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <label>🔄 AJUSTE DE ORIENTACIÓN Y PERSPECTIVA:</label>
                        <button onclick="rotar90Rapido()" style="padding:4px 8px; font-size:10px; background:#475569; border:none; color:white; border-radius:4px;">+90°</button>
                    </div>
                    <input type="range" id="giroRuedita" min="-45" max="45" value="0" oninput="ajustarGiroFinoRuedita()">
                    <button onclick="procesarPerspectivaHomograficaManual()" class="btn-block" style="background:#0f172a; font-size:11px; min-height:32px; margin-top:5px;">📐 Aplicar Recorte y Alinear Perspectiva</button>
                </div>

                <div class="config-section">
                    <label>📐 FORMATO HOJA PDF (PARA HOJA ACTIVA):</label>
                    <div style="display: flex; gap: 8px; margin-top: 4px;">
                        <select id="pdfTamaño" onchange="guardarCambiosHojaActiva()">
                            <option value="a4">A4</option>
                            <option value="a3">A3</option>
                            <option value="legal">Oficio</option>
                            <option value="letter">Carta</option>
                        </select>
                        <select id="pdfOrientacion" onchange="guardarCambiosHojaActiva()">
                            <option value="p">Vertical (Retrato)</option>
                            <option value="l">Horizontal (Apaisado)</option>
                        </select>
                    </div>
                </div>

                <div class="config-section">
                    <label>🖼️ FORMATO DE CONTENIDO:</label>
                    <select id="tipoContenido" onchange="guardarCambiosHojaActiva()">
                        <option value="extendido">Tamaño Extendido (Máximo / Ajustar a la hoja)</option>
                        <option value="real">Tamaño Real (Aprox. Credencial / DNI)</option>
                        <option value="frente_dorso">Frente y Reverso en la misma Hoja (Alineados)</option>
                        <option value="ampliado">Tamaño Ampliado (Zoom Manual)</option>
                    </select>
                    
                    <div id="wrapperSlotsCredencial" style="display:none;">
                        <label>🪪 PASO EN CURSO (CREDENCIAL):</label>
                        <div class="slot-container">
                            <div class="slot-box active" id="slot_frente" onclick="cambiarRanuraEdicion('frente')">
                                🟩 Frente (Cara A)
                                <div id="preview_slot_frente">- Vacío -</div>
                            </div>
                            <div class="slot-box" id="slot_dorso" onclick="cambiarRanuraEdicion('dorso')">
                                🟨 Reverso (Cara B)
                                <div id="preview_slot_dorso">- Vacío -</div>
                            </div>
                        </div>
                        <button type="button" id="btnConfirmarYReiniciar" onclick="confirmarHojaYReiniciarInterfaz()" style="width:100%; background: #15803d; font-size:12px; padding:8px; margin-top:6px; font-weight:bold; color:white; border:none; border-radius:5px;">✅ Confirmar y Escanear Siguiente Documento</button>
                        <button type="button" id="btnLimpiarDorso" onclick="cancelarReversoDorso()" style="width:100%; background:#6c757d; font-size:10px; padding:4px; margin-top:4px; min-height:20px; display:none;">❌ Cancelar / Limpiar Reverso</button>
                    </div>

                    <div id="wrapperZoomManual" style="display:none;">
                        <label id="lblZoomManual">🔍 Zoom Manual del Contenido:</label>
                        <input type="range" id="zoomManual" min="30" max="180" value="100" oninput="guardarCambiosHojaActiva()">
                    </div>
                </div>

                <button class="btn-block" id="btnExportar" style="margin-bottom:15px;" disabled>⚙️ Generar y Guardar PDF Final</button>
                
                <div class="workspace-title">
                    <span>🗂️ Hojas del Proyecto:</span>
                    <select id="vistaCola" style="width:auto; padding:2px; font-size:11px;" onchange="cambiarVistaCola()">
                        <option value="horizontal">Horizontal</option>
                        <option value="vertical">Vertical</option>
                    </select>
                </div>
                <div class="workspace" id="workspace"></div>
            </div>
        </div>

        <div class="preview-panel" id="previewPanel">
            <div class="pdf-canvas-mock" id="pdfMock">
                <div id="mockAviso" style="color:#94a3b8; font-size:12px; text-align:center; padding:20px;">No hay contenido para previsualizar.</div>
                <div id="containerMockImagenes" style="width:100%; height:100%; position:relative; display:none;">
                    <img id="mockImg" src="">
                    <img id="mockImgDorso" src="" style="display:none;">
                </div>
                <svg class="ruler-svg-overlay" id="rulerOverlay"></svg>
            </div>
        </div>
    </div>

    <div id="cameraModal" class="camera-modal">
        <video id="videoStream" autoplay playsinline></video>
        <div class="camera-controls">
            <button onclick="tomarFotoWebcam()" style="background-color: var(--primary);">📸 Capturar</button>
            <button onclick="cerrarModalCamara()" style="background-color: #ef4444;">❌ Cancelar</button>
        </div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        let documentoHojas = [];
        let indiceActivo = -1;
        let ranuraActiva = 'frente'; 
        let openCvListo = false;
        let localStream = null;
        let puntoCeroFijo = null;

        document.getElementById('opencv-src').addEventListener('load', () => { openCvListo = true; document.getElementById('cvLoading').style.display = "none"; });

        const cameraInput = document.getElementById('cameraInput');
        const galleryInput = document.getElementById('galleryInput');
        cameraInput.addEventListener('change', (e) => registrarArchivosMesa(e.target.files));
        galleryInput.addEventListener('change', (e) => registrarArchivosMesa(e.target.files));

        function dispararCamaraDispositivo() { if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) { cameraInput.click(); } else { abrirWebcamPC(); } }
        async function abrirWebcamPC() { const modal = document.getElementById('cameraModal'); const video = document.getElementById('videoStream'); try { localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } }); video.srcObject = localStream; modal.style.display = "flex"; } catch (err) { alert("Sin acceso a la cámara."); } }
        
        function tomarFotoWebcam() { 
            const video = document.getElementById('videoStream'); 
            const canvas = document.createElement('canvas'); 
            canvas.width = video.videoWidth; canvas.height = video.videoHeight; 
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height); 
            const fotoCapturada = canvas.toDataURL('image/jpeg', 0.9);
            cerrarModalCamara();
            procesarEntradaImagenCruda(fotoCapturada, canvas.width, canvas.height); 
        }

        function cerrarModalCamara() { document.getElementById('cameraModal').style.display = "none"; if(localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; } }

        function registrarArchivosMesa(files) {
            if(files.length === 0) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() { procesarEntradaImagenCruda(event.target.result, img.width, img.height); };
                img.src = event.target.result;
            };
            reader.readAsDataURL(files[0]);
        }

        function procesarEntradaImagenCruda(srcBase64, width, height) {
            if (indiceActivo !== -1 && documentoHojas[indiceActivo] && documentoHojas[indiceActivo].tipoContenido === 'frente_dorso' && ranuraActiva === 'dorso') {
                const hoja = documentoHojas[indiceActivo];
                hoja.srcDorsoRaw = srcBase64; hoja.srcDorso = srcBase64;
                hoja.widthDorso = width; hoja.heightDorso = height;
                hoja.cornersDorso = { tl: {x: 10, y: 10}, tr: {x: 90, y: 10}, br: {x: 90, y: 90}, bl: {x: 10, y: 90} };
                hoja.rotationDorso = 0; hoja.rueditaGiroFinoDorso = 0;
            } else {
                let orientacionDeteccion = "p";
                if (width > height) { orientacionDeteccion = "l"; }
                
                let tipoSeleccionado = document.getElementById('tipoContenido').value;

                const hoja = {
                    id: Date.now() + Math.random(),
                    srcRaw: srcBase64, src: srcBase64, srcDorsoRaw: null, srcDorso: null,
                    rotation: 0, rueditaGiroFino: 0, rotationDorso: 0, rueditaGiroFinoDorso: 0,
                    corners: { tl: {x: 10, y: 10}, tr: {x: 90, y: 10}, br: {x: 90, y: 90}, bl: {x: 10, y: 90} },
                    cornersDorso: { tl: {x: 10, y: 10}, tr: {x: 90, y: 10}, br: {x: 90, y: 90}, bl: {x: 10, y: 90} },
                    widthOriginal: width, heightOriginal: height, widthDorso: 0, heightDorso: 0,
                    pdfTamaño: "a4", pdfOrientacion: orientacionDeteccion, tipoContenido: tipoSeleccionado, zoomManual: 100
                };
                documentoHojas.push(hoja); indiceActivo = documentoHojas.length - 1; ranuraActiva = 'frente';
            }
            renderizarColaHojas(); cargarEditorImagenActiva();
        }

        function cambiarRanuraEdicion(ranura) { ranuraActiva = ranura; cargarEditorImagenActiva(); }
        
        function cancelarReversoDorso() {
            if(indiceActivo === -1 || !documentoHojas[indiceActivo]) return;
            const hoja = documentoHojas[indiceActivo];
            hoja.srcDorsoRaw = null; hoja.srcDorso = null; ranuraActiva = 'frente';
            renderizarColaHojas(); cargarEditorImagenActiva();
        }

        function confirmarHojaYReiniciarInterfaz() {
            if (indiceActivo === -1) return;
            document.getElementById('editorLocalBox').style.display = "none";
            document.getElementById('wrapperGiroManual').style.display = "none";
            indiceActivo = -1; ranuraActiva = 'frente';
            renderizarColaHojas();
        }

        function guardarCambiosHojaActiva() {
            if (indiceActivo === -1 || !documentoHojas[indiceActivo]) return;
            const hoja = documentoHojas[indiceActivo];
            hoja.pdfTamaño = document.getElementById('pdfTamaño').value;
            hoja.pdfOrientacion = document.getElementById('pdfOrientacion').value;
            hoja.tipoContenido = document.getElementById('tipoContenido').value;
            hoja.zoomManual = parseInt(document.getElementById('zoomManual').value);
            renderizarColaHojas();
        }

        function sincronizarSelectoresConHojaActiva() {
            if (indiceActivo === -1 || !documentoHojas[indiceActivo]) {
                document.getElementById('wrapperZoomManual').style.display = "none";
                document.getElementById('wrapperSlotsCredencial').style.display = "none";
                document.getElementById('btnCapturarGatillo').innerText = "📷 Capturar Foto";
                return;
            }
            const hoja = documentoHojas[indiceActivo];
            
            document.getElementById('tipoContenido').value = hoja.tipoContenido;
            document.getElementById('pdfTamaño').value = hoja.pdfTamaño;
            document.getElementById('pdfOrientacion').value = hoja.pdfOrientacion;
            document.getElementById('zoomManual').value = hoja.zoomManual;
            
            const mostrarZoom = (hoja.tipoContenido === 'ampliado' || hoja.tipoContenido === 'frente_dorso' || hoja.tipoContenido === 'real');
            document.getElementById('wrapperZoomManual').style.display = mostrarZoom ? "block" : "none";
            document.getElementById('wrapperSlotsCredencial').style.display = (hoja.tipoContenido === 'frente_dorso') ? "block" : "none";
            document.getElementById('lblZoomManual').innerText = (hoja.tipoContenido === 'frente_dorso' || hoja.tipoContenido === 'real') ? "🔍 Ajustar Zoom de Impresión (Hoja PDF):" : "🔍 Zoom Manual del Contenido:";

            document.getElementById('preview_slot_frente').innerHTML = `<img src="${hoja.src}">`;
            document.getElementById('preview_slot_dorso').innerHTML = hoja.srcDorso ? `<img src="${hoja.srcDorso}">` : '- Vacío -';
            document.getElementById('btnLimpiarDorso').style.display = hoja.srcDorso ? "block" : "none";
            document.getElementById('giroRuedita').value = (ranuraActiva === 'frente') ? hoja.rueditaGiroFino : hoja.rueditaGiroFinoDorso;

            const btnGatillo = document.getElementById('btnCapturarGatillo');
            if (hoja.tipoContenido === 'frente_dorso' && !hoja.srcDorso) { btnGatillo.innerText = "📸 Capturar Reverso ahora"; } 
            else { btnGatillo.innerText = "📷 Capturar Foto"; }
        }

        function renderizarColaHojas() {
            const workspace = document.getElementById('workspace');
            const btnExportar = document.getElementById('btnExportar');
            workspace.innerHTML = '';
            
            if(documentoHojas.length === 0) {
                workspace.innerHTML = '<p style="font-size:11px; color:#888;">Cola vacía.</p>';
                btnExportar.disabled = true; document.getElementById('mockAviso').style.display = "block";
                document.getElementById('containerMockImagenes').style.display = "none";
                document.getElementById('editorLocalBox').style.display = "none";
                document.getElementById('wrapperGiroManual').style.display = "none";
                return;
            }
            btnExportar.disabled = false;

            documentoHojas.forEach((hoja, index) => {
                const card = document.createElement('div');
                card.className = `page-card ${index === indiceActivo ? 'active' : ''}`;
                card.setAttribute('draggable', true);
                card.addEventListener('dragstart', (e) => e.dataTransfer.setData('text/plain', index));
                card.addEventListener('dragover', (e) => e.preventDefault());
                card.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const deIndex = parseInt(e.dataTransfer.getData('text/plain'));
                    const elemento = documentoHojas.splice(deIndex, 1)[0];
                    documentoHojas.splice(index, 0, elemento);
                    indiceActivo = index; renderizarColaHojas(); cargarEditorImagenActiva();
                });
                card.addEventListener('click', (e) => {
                    if(e.target.tagName !== 'BUTTON') { indiceActivo = index; ranuraActiva = 'frente'; renderizarColaHojas(); cargarEditorImagenActiva(); }
                });
                let renderImg = `<img src="${hoja.src}">`;
                if(hoja.tipoContenido === 'frente_dorso') {
                    renderImg = `<div style="display:flex; gap:2px;"><img src="${hoja.src}" style="max-width:35px;"><img src="${hoja.srcDorso ? hoja.srcDorso : ''}" style="max-width:35px; background:#ddd;"></div>`;
                }
                card.innerHTML = `<div style="font-size:10px; font-weight:bold; color:#475569;">Pág. ${index + 1}</div>${renderImg}<div class="card-actions"><button onclick="eliminarHoja(${index}); event.stopPropagation();">🗑️</button></div>`;
                workspace.appendChild(card);
            });
            sincronizarSelectoresConHojaActiva(); actualizarPrevisualizadorGlobal();
        }

        function eliminarHoja(index) {
            documentoHojas.splice(index, 1);
            if(indiceActivo >= documentoHojas.length) indiceActivo = documentoHojas.length - 1;
            ranuraActiva = 'frente';
            renderizarColaHojas();
        }

        function cambiarVistaCola() {
            const tipo = document.getElementById('vistaCola').value;
            const workspace = document.getElementById('workspace');
            if(tipo === 'vertical') workspace.classList.add('vertical');
            else workspace.classList.remove('vertical');
        }

        function cargarEditorImagenActiva() {
            if(indiceActivo === -1 || !documentoHojas[indiceActivo]) return;
            const hoja = documentoHojas[indiceActivo];
            document.getElementById('editorLocalBox').style.display = "block";
            document.getElementById('wrapperGiroManual').style.display = "block";
            const img = document.getElementById('editorImg');
            if (ranuraActiva === 'dorso') {
                img.src = hoja.srcDorsoRaw ? hoja.srcDorsoRaw : hoja.srcRaw;
                img.style.transform = `rotate(${hoja.rotationDorso + hoja.rueditaGiroFinoDorso}deg)`;
            } else {
                img.src = hoja.srcRaw; img.style.transform = `rotate(${hoja.rotation + hoja.rueditaGiroFino}deg)`;
            }
            setTimeout(() => { armarEsquinasYLineasGraficas(hoja); }, 50);
            sincronizarSelectoresConHojaActiva();
        }

        function armarEsquinasYLineasGraficas(hoja) {
            const container = document.getElementById('editorLocalBox');
            const esquinas = ['tl', 'tr', 'br', 'bl'];
            const cMap = (ranuraActiva === 'frente') ? hoja.corners : hoja.cornersDorso;
            esquinas.forEach(pos => {
                const handle = document.getElementById(`pt_${pos}`);
                handle.style.left = cMap[pos].x + "%"; handle.style.top = cMap[pos].y + "%";
                handle.onmousedown = (e) => iniciarMovimientoEsquina(e, pos, cMap, handle, container);
                handle.ontouchstart = (e) => iniciarMovimientoEsquina(e, pos, cMap, handle, container);
            });
            dibujarPoligonoSVG(cMap);
        }

        function iniciarMovimientoEsquina(e, pos, cMap, handle, container) {
            e.preventDefault();
            const touch = e.touches ? e.touches[0] : e;
            const startX = touch.clientX; const startY = touch.clientY;
            const startLeft = handle.offsetLeft; const startTop = handle.offsetTop;
            
            document.onmousemove = moverEsquina; document.ontouchmove = moverEsquina;
            document.onmouseup = detenerMovimiento; document.ontouchend = detenerMovimiento;
            
            function moverEsquina(ev) {
                const moveTouch = ev.touches ? ev.touches[0] : ev;
                let l = startLeft + (moveTouch.clientX - startX); let t = startTop + (moveTouch.clientY - startY);
                l = Math.max(0, Math.min(l, container.offsetWidth)); t = Math.max(0, Math.min(t, container.offsetHeight));
                handle.style.left = l + "px"; handle.style.top = t + "px";
                cMap[pos].x = (l / container.offsetWidth) * 100; cMap[pos].y = (t / container.offsetHeight) * 100;
                dibujarPoligonoSVG(cMap);
            }
            function detenerMovimiento() { document.onmousemove = document.ontouchmove = document.onmouseup = document.ontouchend = null; }
        }

        function dibujarPoligonoSVG(cMap) {
            const container = document.getElementById('editorLocalBox');
            if(!container.offsetWidth) return;
            const w = container.offsetWidth, h = container.offsetHeight;
            document.getElementById('svgPoly').setAttribute('points', `${(cMap.tl.x/100)*w},${(cMap.tl.y/100)*h} ${(cMap.tr.x/100)*w},${(cMap.tr.y/100)*h} ${(cMap.br.x/100)*w},${(cMap.br.y/100)*h} ${(cMap.bl.x/100)*w},${(cMap.bl.y/100)*h}`);
        }

        function rotar90Rapido() {
            if(indiceActivo === -1) return;
            const hoja = documentoHojas[indiceActivo];
            if(ranuraActiva === 'dorso') { hoja.rotationDorso = (hoja.rotationDorso + 90) % 360; }
            else { hoja.rotation = (hoja.rotation + 90) % 360; }
            cargarEditorImagenActiva(); actualizarPrevisualizadorGlobal();
        }

        function ajustarGiroFinoRuedita() {
            if(indiceActivo === -1) return;
            const val = parseInt(document.getElementById('giroRuedita').value);
            const hoja = documentoHojas[indiceActivo];
            if(ranuraActiva === 'dorso') { hoja.rueditaGiroFinoDorso = val; document.getElementById('editorImg').style.transform = `rotate(${hoja.rotationDorso + val}deg)`; }
            else { hoja.rueditaGiroFino = val; document.getElementById('editorImg').style.transform = `rotate(${hoja.rotation + val}deg)`; }
        }

        function procesarPerspectivaHomograficaManual() {
            if (!openCvListo || indiceActivo === -1) return;
            const hoja = documentoHojas[indiceActivo];
            const img = new Image();
            img.src = (ranuraActiva === 'dorso') ? hoja.srcDorsoRaw : hoja.srcRaw;
            
            img.onload = function() {
                const canvas = document.getElementById('canvasAux'); const ctx = canvas.getContext('2d');
                canvas.width = img.width; canvas.height = img.height;
                
                const rTotal = (ranuraActiva === 'frente') ? (hoja.rotation + hoja.rueditaGiroFino) : (hoja.rotationDorso + hoja.rueditaGiroFinoDorso);
                ctx.translate(canvas.width/2, canvas.height/2); ctx.rotate((rTotal * Math.PI) / 180); ctx.drawImage(img, -img.width/2, -img.height/2);
                
                let src = cv.imread(canvas); 
                const cMap = (ranuraActiva === 'frente') ? hoja.corners : hoja.cornersDorso;

                let srcCoords = cv.matFromArray(4, 1, cv.CV_32FC2, [
                    (cMap.tl.x/100)*src.cols, (cMap.tl.y/100)*src.rows, 
                    (cMap.tr.x/100)*src.cols, (cMap.tr.y/100)*src.rows, 
                    (cMap.br.x/100)*src.cols, (cMap.br.y/100)*src.rows, 
                    (cMap.bl.x/100)*src.cols, (cMap.bl.y/100)*src.rows
                ]);

                let maxW = Math.max(Math.abs((cMap.tr.x - cMap.tl.x)), Math.abs((cMap.br.x - cMap.bl.x))) * (src.cols/100);
                let maxH = Math.max(Math.abs((cMap.bl.y - cMap.tl.y)), Math.abs((cMap.br.y - cMap.tr.y))) * (src.rows/100);

                let dstCoords = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, maxW, 0, maxW, maxH, 0, maxH]);
                let M = cv.getPerspectiveTransform(srcCoords, dstCoords); let transformed = new cv.Mat();
                cv.warpPerspective(src, transformed, M, new cv.Size(maxW, maxH), cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());
                
                let outCanvas = document.createElement('canvas'); 
                cv.imshow(outCanvas, transformed);
                
                if (ranuraActiva === 'dorso') {
                    hoja.srcDorso = outCanvas.toDataURL('image/jpeg', 0.9);
                    src.delete(); srcCoords.delete(); dstCoords.delete(); M.delete(); transformed.delete();
                    renderizarColaHojas(); cargarEditorImagenActiva();
                } else {
                    hoja.src = outCanvas.toDataURL('image/jpeg', 0.9);
                    src.delete(); srcCoords.delete(); dstCoords.delete(); M.delete(); transformed.delete();
                    if(hoja.tipoContenido === 'frente_dorso' && !hoja.srcDorso) { ranuraActiva = 'dorso'; }
                    renderizarColaHojas(); cargarEditorImagenActiva();
                }
            };
        }

        function rediseñarReglasLienzoTecnico(mockWidth, mockHeight, mmW, mmH, e) {
            const svg = document.getElementById('rulerOverlay');
            svg.innerHTML = ''; 

            let totalCmX = mmW / 10; let totalCmY = mmH / 10;
            let xCursor = mockWidth / 2; let yCursor = mockHeight / 2;

            if (e) {
                const rectMock = document.getElementById('pdfMock').getBoundingClientRect();
                xCursor = Math.max(0, Math.min(e.clientX - rectMock.left, mockWidth));
                yCursor = Math.max(0, Math.min(e.clientY - rectMock.top, mockHeight));
            }
            if (puntoCeroFijo) { xCursor = puntoCeroFijo.x; yCursor = puntoCeroFijo.y; }

            let cmActualX = (xCursor / mockWidth) * totalCmX;
            let cmActualY = (yCursor / mockHeight) * totalCmY;

            let hRuler = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            hRuler.setAttribute("x", "0"); hRuler.setAttribute("y", "0"); hRuler.setAttribute("width", mockWidth); hRuler.setAttribute("height", "22");
            hRuler.setAttribute("style", "fill:rgba(18, 27, 34, 0.85); stroke:rgba(255,255,255,0.1);");
            svg.appendChild(hRuler);

            for (let i = 0; i <= totalCmX; i++) {
                let posX = (i / totalCmX) * mockWidth;
                let line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", posX); line.setAttribute("y1", "0");
                line.setAttribute("x2", posX); line.setAttribute("y2", i % 5 === 0 ? "14" : "7");
                line.setAttribute("style", "stroke:rgba(37,211,102,0.6); stroke-width:1;");
                svg.appendChild(line);

                let deltaX = Math.abs(i - cmActualX);
                if (i % 2 === 0 && posX < mockWidth - 10 && posX > 10) {
                    let txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    txt.setAttribute("x", posX - 4); txt.setAttribute("y", "19");
                    txt.setAttribute("fill", deltaX < 0.4 ? "#007bff" : "#25D366"); 
                    txt.setAttribute("font-size", deltaX < 0.4 ? "10px" : "8px");
                    txt.textContent = Math.round(deltaX);
                    svg.appendChild(txt);
                }
            }

            let vRuler = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            vRuler.setAttribute("x", "0"); vRuler.setAttribute("y", "0");
            vRuler.setAttribute("width", "22"); vRuler.setAttribute("height", mockHeight);
            vRuler.setAttribute("style", "fill:rgba(18, 27, 34, 0.85); stroke:rgba(255,255,255,0.1);");
            svg.appendChild(vRuler);

            for (let i = 0; i <= totalCmY; i++) {
                let posY = (i / totalCmY) * mockHeight;
                let line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", "0"); line.setAttribute("y1", posY);
                line.setAttribute("x2", i % 5 === 0 ? "14" : "7"); line.setAttribute("y2", posY);
                line.setAttribute("style", "stroke:rgba(37,211,102,0.6); stroke-width:1;");
                svg.appendChild(line);

                let deltaY = Math.abs(i - cmActualY);
                if (i % 2 === 0 && posY < mockHeight - 10 && posY > 10) {
                    let txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    txt.setAttribute("x", "14"); txt.setAttribute("y", posY + 3);
                    txt.setAttribute("fill", deltaY < 0.4 ? "#007bff" : "#25D366");
                    txt.setAttribute("font-size", deltaY < 0.4 ? "10px" : "8px");
                    txt.textContent = Math.round(deltaY);
                    svg.appendChild(txt);
                }
            }

            if (e || puntoCeroFijo) {
                const rectMock = document.getElementById('pdfMock').getBoundingClientRect();
                let actualX = e ? Math.max(0, Math.min(e.clientX - rectMock.left, mockWidth)) : xCursor;
                let actualY = e ? Math.max(0, Math.min(e.clientY - rectMock.top, mockHeight)) : yCursor;

                let xLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
                xLine.setAttribute("x1", "0"); xLine.setAttribute("y1", actualY); xLine.setAttribute("x2", mockWidth); xLine.setAttribute("y2", actualY);
                xLine.setAttribute("style", "stroke:#007bff; stroke-width:1.5; stroke-dasharray:3;");
                svg.appendChild(xLine);

                let yLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
                yLine.setAttribute("x1", actualX); yLine.setAttribute("y1", "0");
                yLine.setAttribute("x2", actualX); yLine.setAttribute("y2", mockHeight);
                yLine.setAttribute("style", "stroke:#007bff; stroke-width:1.5; stroke-dasharray:3;");
                svg.appendChild(yLine);

                let circleCenter = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circleCenter.setAttribute("cx", actualX); circleCenter.setAttribute("cy", actualY);
                circleCenter.setAttribute("r", "5"); circleCenter.setAttribute("fill", puntoCeroFijo ? "#ffc107" : "#007bff");
                svg.appendChild(circleCenter);

                let finalCmX = (actualX / mockWidth) * totalCmX; let finalCmY = (actualY / mockHeight) * totalCmY;
                let distIzq = Math.abs(finalCmX - cmActualX); let distTop = Math.abs(finalCmY - cmActualY);

                let txtInfo = document.createElementNS("http://www.w3.org/2000/svg", "text");
                txtInfo.setAttribute("x", actualX + 10); txtInfo.setAttribute("y", actualY - 10);
                txtInfo.setAttribute("fill", "#ffffff"); txtInfo.setAttribute("font-size", "10px"); txtInfo.setAttribute("font-weight", "bold");
                txtInfo.setAttribute("style", "paint-order: stroke; stroke: #121b22; stroke-width: 3px;");
                
                if (puntoCeroFijo) { txtInfo.textContent = `↔️ ${distIzq.toFixed(1)} cm | ↕️ ${distTop.toFixed(1)} cm`; } 
                else { txtInfo.textContent = `← ${finalCmX.toFixed(1)} cm | ↑ ${finalCmY.toFixed(1)} cm`; }
                svg.appendChild(txtInfo);
            }
        }

        async function actualizarPrevisualizadorGlobal(eEvent) {
            const mock = document.getElementById('pdfMock');
            const aviso = document.getElementById('mockAviso');
            const wrapperImgs = document.getElementById('containerMockImagenes');
            const mockImg = document.getElementById('mockImg');
            const mockImgDorso = document.getElementById('mockImgDorso');
            
            if(indiceActivo === -1 || documentoHojas.length === 0) {
                if (documentoHojas.length > 0) {
                    aviso.style.display = "none"; wrapperImgs.style.display = "block";
                    const ultimaHoja = documentoHojas[documentoHojas.length - 1];
                    renderizarVistaHojaEspecifica(ultimaHoja, mock, wrapperImgs, mockImg, mockImgDorso, eEvent);
                } else {
                    aviso.style.display = "block"; wrapperImgs.style.display = "none";
                }
                return;
            }
            aviso.style.display = "none"; wrapperImgs.style.display = "block";
            const hoja = documentoHojas[indiceActivo];
            renderizarVistaHojaEspecifica(hoja, mock, wrapperImgs, mockImg, mockImgDorso, eEvent);
        }

        function renderizarVistaHojaEspecifica(hoja, mock, wrapperImgs, mockImg, mockImgDorso, eEvent) {
            let mmW = 210, mmH = 297;
            if(hoja.pdfTamaño === 'a3') { mmW = 297; mmH = 420; }
            else if(hoja.pdfTamaño === 'legal') { mmW = 215.9; mmH = 355.6; }
            else if(hoja.pdfTamaño === 'letter') { mmW = 215.9; mmH = 279.4; }
            
            if(hoja.pdfOrientacion === 'l') { let aux = mmW; mmW = mmH; mmH = aux; }
            let aspectoHoja = mmW / mmH;

            const panelContainer = document.getElementById('previewPanel');
            const pHeight = panelContainer.offsetHeight - 40;
            const pWidth = panelContainer.offsetWidth - 40;

            let targetHeight = pHeight; let targetWidth = pHeight * aspectoHoja;
            if (targetWidth > pWidth) { targetWidth = pWidth; targetHeight = pWidth / aspectoHoja; }

            mock.style.height = targetHeight + "px"; mock.style.width = targetWidth + "px";

            const imgFrente = new Image();
            imgFrente.src = hoja.src;
            imgFrente.onload = function() {
                let aspectFrente = imgFrente.width / imgFrente.height;
                const factorZoom = hoja.zoomManual / 100;

                if (hoja.tipoContenido === "frente_dorso") {
                    if (hoja.srcDorso) {
                        const imgDorso = new Image();
                        imgDorso.src = hoja.srcDorso;
                        imgDorso.onload = function() {
                            let aspectDorso = imgDorso.width / imgDorso.height;

                            let baseW = 60 * factorZoom;
                            let altoFrenteComponente = (baseW / aspectFrente) * aspectoHoja;
                            let altoDorsoComponente = (baseW / aspectDorso) * aspectoHoja;
                            let altoTotalConjunto = altoFrenteComponente + altoDorsoComponente + 4;

                            if (altoTotalConjunto > 90) {
                                let ratioReduccion = 90 / altoTotalConjunto;
                                baseW = baseW * ratioReduccion;
                                altoFrenteComponente = altoFrenteComponente * ratioReduccion;
                                altoDorsoComponente = altoDorsoComponente * ratioReduccion;
                            }

                            let leftPos = (100 - baseW) / 2;
                            let topFrente = 50 - altoFrenteComponente - 1;
                            let topDorso = 50 + 1;

                            mockImg.src = hoja.src;
                            mockImg.style.display = "block"; 
                            mockImg.style.width = baseW + "%"; mockImg.style.height = altoFrenteComponente + "%";
                            mockImg.style.top = topFrente + "%"; mockImg.style.left = leftPos + "%";
                            mockImg.style.objectFit = "fill";

                            mockImgDorso.style.display = "block"; mockImgDorso.src = hoja.srcDorso;
                            mockImgDorso.style.width = baseW + "%"; mockImgDorso.style.height = altoDorsoComponente + "%";
                            mockImgDorso.style.top = topDorso + "%"; mockImgDorso.style.left = leftPos + "%";
                            mockImgDorso.style.objectFit = "fill";
                        };
                    } else {
                        let baseW = 60 * factorZoom;
                        let baseH = (60 / aspectFrente) * aspectoHoja * factorZoom;
                        if (baseH > 40) { baseH = 40; baseW = (40 / aspectoHoja) * aspectFrente; }
                        let leftPos = (100 - baseW) / 2;

                        mockImg.src = hoja.src;
                        mockImg.style.display = "block"; 
                        mockImg.style.width = baseW + "%"; mockImg.style.height = baseH + "%";
                        mockImg.style.top = "8%"; mockImg.style.left = leftPos + "%";
                        mockImgDorso.style.display = "none";
                    }
                } 
                else if (hoja.tipoContenido === "extendido") {
                    let baseW = 100, baseH = 100;
                    if (aspectFrente > aspectoHoja) { baseH = (100 / aspectFrente) * aspectoHoja; } 
                    else { baseW = (100 * aspectFrente) / aspectoHoja; }
                    mockImgDorso.style.display = "none";
                    mockImg.src = hoja.src;
                    mockImg.style.width = baseW + "%"; mockImg.style.height = baseH + "%";
                    mockImg.style.top = ((100 - baseH)/2) + "%"; mockImg.style.left = ((100 - baseW)/2) + "%";
                    mockImg.style.objectFit = "fill";
                }
                else {
                    let escalaBase = (hoja.tipoContenido === 'real') ? 55 : 85;
                    let baseW = escalaBase * factorZoom; let baseH = (escalaBase / aspectFrente) * aspectoHoja * factorZoom;
                    if(baseW > 100) { baseW = 100; baseH = (100 / aspectFrente) * aspectoHoja; }
                    if(baseH > 100) { baseH = 100; baseW = (100 * aspectFrente) / aspectoHoja; }

                    mockImgDorso.style.display = "none";
                    mockImg.src = hoja.src;
                    mockImg.style.width = baseW + "%"; mockImg.style.height = baseH + "%";
                    mockImg.style.top = ((100 - baseH)/2) + "%"; mockImg.style.left = ((100 - baseW)/2) + "%";
                    mockImg.style.objectFit = "fill";
                }
                rediseñarReglasLienzoTecnico(targetWidth, targetHeight, mmW, mmH, eEvent);
            };

            panelContainer.onmousemove = function(evt) { actualizarPrevisualizadorGlobal(evt); };
            panelContainer.ontouchmove = function(evt) { if(evt.touches.length > 0) { actualizarPrevisualizadorGlobal(evt.touches[0]); } };
            
            mock.onmousedown = function(evt) {
                const rectMock = mock.getBoundingClientRect();
                puntoCeroFijo = { x: evt.clientX - rectMock.left, y: evt.clientY - rectMock.top };
                actualizarPrevisualizadorGlobal(evt);
            };
            mock.ondblclick = function() { puntoCeroFijo = null; actualizarPrevisualizadorGlobal(null); };
        }

        function manejarCambioOrientacionYDimensiones() {
            actualizarPrevisualizadorGlobal(null);
            setTimeout(() => { if (indiceActivo !== -1) dibujarPoligonoSVG((ranuraActiva === 'frente') ? documentoHojas[indiceActivo].corners : documentoHojas[indiceActivo].cornersDorso); }, 150);
            if (window.innerHeight < window.innerWidth && /Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(() => {}); }
            } else {
                if (document.fullscreenElement) { document.exitFullscreen().catch(() => {}); }
            }
        }

        window.addEventListener('resize', manejarCambioOrientacionYDimensiones);
        window.addEventListener('orientationchange', manejarCambioOrientacionYDimensiones);

        document.getElementById('btnExportar').addEventListener('click', async () => {
            const btn = document.getElementById('btnExportar'); btn.innerText = "Compilando..."; btn.disabled = true;
            let pdf = null;

            for (let i = 0; i < documentoHojas.length; i++) {
                const hoja = documentoHojas[i];
                if (i === 0) { pdf = new jsPDF(hoja.pdfOrientacion, 'mm', hoja.pdfTamaño); } 
                else { pdf.addPage(hoja.pdfTamaño, hoja.pdfOrientacion); }

                const pdfW = pdf.internal.pageSize.getWidth(); const pdfH = pdf.internal.pageSize.getHeight();
                const aspectoHoja = pdfW / pdfH;

                const imgMedidaFrente = await obtenerDimensionesImagenPromesa(hoja.src);
                let aspectFrente = imgMedidaFrente.w / imgMedidaFrente.height;
                const factorZoom = hoja.zoomManual / 100;

                if (hoja.tipoContenido === "frente_dorso") {
                    if (hoja.srcDorso) {
                        const imgMedidaDorso = await obtenerDimensionesImagenPromesa(hoja.srcDorso);
                        let aspectDorso = imgMedidaDorso.w / imgMedidaDorso.height;

                        let targetW = pdfW * 0.60 * factorZoom;
                        let altoFrenteMm = targetW / aspectFrente;
                        let altoDorsoMm = targetW / aspectDorso;
                        let altoConjuntoMm = altoFrenteMm + altoDorsoMm + 6;

                        if (altoConjuntoMm > pdfH * 0.90) {
                            let globalRatio = (pdfH * 0.90) / altoConjuntoMm;
                            targetW = targetW * globalRatio;
                            altoFrenteMm = altoFrenteMm * globalRatio;
                            altoDorsoMm = altoDorsoMm * globalRatio;
                        }

                        let posX = (pdfW - targetW) / 2;
                        let centroPapelY = pdfH / 2;
                        let posYFrente = centroPapelY - altoFrenteMm - 2;
                        let posYDorso = centroPapelY + 2;

                        pdf.addImage(hoja.src, 'JPEG', posX, posYFrente, targetW, altoFrenteMm);
                        pdf.addImage(hoja.srcDorso, 'JPEG', posX, posYDorso, targetW, altoDorsoMm);
                    } else {
                        let targetW = pdfW * 0.60 * factorZoom; let targetH = (pdfW * 0.60 / aspectFrente) * factorZoom;
                        pdf.addImage(hoja.src, 'JPEG', (pdfW - targetW)/2, pdfH * 0.08, targetW, targetH);
                    }
                } 
                else if (hoja.tipoContenido === "extendido") {
                    let targetW = pdfW, targetH = pdfH;
                    if (aspectFrente > aspectoHoja) { targetH = pdfW / aspectFrente; } else { targetW = pdfH * aspectFrente; }
                    pdf.addImage(hoja.src, 'JPEG', (pdfW - targetW)/2, (pdfH - targetH)/2, targetW, targetH);
                }
                else {
                    let escalaBase = (hoja.tipoContenido === 'real') ? 0.55 : 0.85;
                    let targetW = pdfW * escalaBase * factorZoom; let targetH = (pdfW * escalaBase / aspectFrente) * factorZoom;
                    if(targetW > pdfW) { targetW = pdfW; targetH = pdfW / aspectFrente; }
                    if(targetH > pdfH) { targetH = pdfH; targetW = pdfH * aspectFrente; }
                    pdf.addImage(hoja.src, 'JPEG', (pdfW - targetW)/2, (pdfH - targetH)/2, targetW, targetH);
                }
            }

            // =========================================================================
            // LÓGICA DE NOMBRE DINÁMICO CRONOLÓGICO ("DS_Scaner_Pro_AAAAMMDDHHMMSS.pdf")
            // =========================================================================
            const ahora = new Date();
            const anio = ahora.getFullYear();
            const mes = String(ahora.getMonth() + 1).padStart(2, '0');
            const dia = String(ahora.getDate()).padStart(2, '0');
            const horas = String(ahora.getHours()).padStart(2, '0');
            const minutos = String(ahora.getMinutes()).padStart(2, '0');
            const segundos = String(ahora.getSeconds()).padStart(2, '0');

            const nombreArchivo = `DS_Scaner_Pro_${anio}${mes}${dia}${horas}${minutos}${segundos}.pdf`;

            pdf.save(nombreArchivo); 
            btn.innerText = "⚙️ Generar y Guardar PDF Final"; btn.disabled = false;
        });

        function obtenerDimensionesImagenPromesa(src) {
            return new Promise((resolve) => { const img = new Image(); img.onload = function() { resolve({w: img.width, height: img.height}); }; img.src = src; });
        }
    </script>
